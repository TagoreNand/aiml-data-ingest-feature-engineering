name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"
  IMAGE_NAME: aiml-platform

jobs:
  # ── Lint & Type-check ──────────────────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "${{ env.PYTHON_VERSION }}" }
      - name: Install linters
        run: pip install ruff mypy types-PyYAML types-requests
      - name: Ruff lint
        run: ruff check src/ scripts/ tests/
      - name: Type check
        run: mypy src/ --ignore-missing-imports --no-strict-optional

  # ── Unit tests ─────────────────────────────────────────────────────────────
  test-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "${{ env.PYTHON_VERSION }}" }
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run unit tests
        run: pytest tests/unit/ -v --cov=src --cov-report=xml
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml

  # ── Integration tests ──────────────────────────────────────────────────────
  test-integration:
    runs-on: ubuntu-latest
    needs: test-unit
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "${{ env.PYTHON_VERSION }}" }
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Copy example config
        run: cp configs/config.example.yaml configs/config.yaml
      - name: Run integration tests
        run: pytest tests/integration/ -v

  # ── Build Docker image ─────────────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    needs: [lint, test-unit]
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deploy to staging ──────────────────────────────────────────────────────
  deploy-staging:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/develop'
    environment: staging
    steps:
      - name: Deploy to staging
        run: echo "Deploy ${{ github.sha }} to staging cluster"
        # Replace with: kubectl set image deployment/aiml-api api=<registry>/${{ env.IMAGE_NAME }}:${{ github.sha }}

  # ── Deploy to production ───────────────────────────────────────────────────
  deploy-production:
    runs-on: ubuntu-latest
    needs: [build, test-integration]
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - name: Deploy to production
        run: echo "Deploy ${{ github.sha }} to production cluster"
